# Dataset root paths — update these to match your local/cloud setup

smoke_test:
  images: third_party/MIDAS/input   # use MiDaS sample images for smoke test

kitti_c:
  root: data/raw/kitti_c/kitti_c    # KITTI-C root (corruption folders at top level)
  gt_path: data/raw/kitti_c         # root containing train/ and val/ GT depth subdirs

nyu_c:
  root: data/raw/nyu_c              # NYUDepth2-C root
  gt_path: data/raw/nyu_gt          # NYU ground-truth depth

diode:
  val_root: data/raw/diode/val      # DIODE validation split only

# Output roots
outputs:
  predictions: outputs/predictions
  metrics: outputs/metrics
  tables: outputs/tables
  galleries: outputs/galleries
  manifests: data/manifests
